services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: lakeb2b_scraper
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d lakeb2b_scraper"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://scraper:scraper_dev@postgres:5432/lakeb2b_scraper
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m src.db.migrate
    restart: "no"

  api:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://scraper:scraper_dev@postgres:5432/lakeb2b_scraper
      REDIS_URL: redis://redis:6379
      PORT: "3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: uvicorn src.server:app --host 0.0.0.0 --port 3001
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://scraper:scraper_dev@postgres:5432/lakeb2b_scraper
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: arq src.queue.worker.WorkerSettings
    restart: unless-stopped

volumes:
  pgdata:
